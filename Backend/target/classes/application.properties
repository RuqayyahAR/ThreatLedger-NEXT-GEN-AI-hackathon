server.port=8080

# ---------- Option A: MySQL (for production / final submission) ----------
# spring.datasource.url=jdbc:mysql://localhost:3306/threatledger?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- Option B: H2 in-memory (zero setup, ideal for hackathon demo) ----------
spring.datasource.url=jdbc:h2:mem:threatledger
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
# Auto-creates/updates tables from the @Entity classes - fine for a hackathon,
# don't rely on this for a real production system.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.ai.openai.api-key=dummy-key-to-bypass-check
# Set your Gemini API Key
spring.ai.vertex.ai.gemini.api-key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
# Disable OpenAI auto-configuration so it stops crashing on startup
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
# ---------- ThreatLedger tuning knobs ----------
# Proof-of-work difficulty: number of leading zero hex chars required in the SHA-256 hash
threatledger.pow.difficulty=4
# Consensus engine thresholds
threatledger.consensus.min-votes=3
threatledger.consensus.verify-threshold=70.0
threatledger.consensus.reject-threshold=30.0
