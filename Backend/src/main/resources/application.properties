server.port=8080

# ---------- Option A: MySQL (recommended for the real submission) ----------
# 1. Install MySQL locally / use one already running.
# 2. Create the database once:  CREATE DATABASE threatledger;
# 3. Fill in your real username/password below.
spring.datasource.url=jdbc:mysql://localhost:3306/threatledger?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- Option B: H2 in-memory (zero setup, data resets every restart) ----------
# Comment out the 4 MySQL lines above and uncomment these 4 lines instead if you
# just want to run the API right now without installing MySQL:
# spring.datasource.url=jdbc:h2:mem:threatledger
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# Auto-creates/updates tables from the @Entity classes - fine for a hackathon,
# don't rely on this for a real production system.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- ThreatLedger tuning knobs ----------
# Proof-of-work difficulty: number of leading zero hex chars required in the SHA-256 hash
threatledger.pow.difficulty=4
# Consensus engine thresholds
threatledger.consensus.min-votes=3
threatledger.consensus.verify-threshold=70.0
threatledger.consensus.reject-threshold=30.0
